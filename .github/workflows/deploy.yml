name: Deploy NextCRM

# 推送到 main 分支即在 self-hosted Runner 上自动构建并打包 Docker 镜像。
# 流水线步骤：
#   1. checkout 源码
#   2. 安装依赖并执行 npm run build 产出 dist/
#   3. 基于 deploy/Dockerfile.runtime 构建运行时 nginx 镜像

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      IMAGE_NAME: nextcrm
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Build Docker image
        run: |
          docker build \
            -f deploy/Dockerfile.runtime \
            -t ${IMAGE_NAME}:${IMAGE_TAG} \
            -t ${IMAGE_NAME}:latest \
            .

      - name: Run Docker container
        run: |
          # 停止并移除已有同名容器，避免 80 端口占用
          docker rm -f ${IMAGE_NAME} 2>/dev/null || true
          docker run -d \
            --name ${IMAGE_NAME} \
            --restart unless-stopped \
            -p 80:80 \
            ${IMAGE_NAME}:${IMAGE_TAG}
