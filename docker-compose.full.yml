# 全栈一键启动：Postgres + 后端(Express) + 前端(nginx 同源反代 /api)
#   docker compose -f docker-compose.full.yml up -d --build
#   访问 http://localhost:8088
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: nextcrm
    volumes:
      - crm_pgdata:/var/lib/postgresql/data
      - ./db/migrations:/migrations:ro
      - ./db/seed.sql:/seed.sql:ro
      - ./db/seed_auth.sql:/seed_auth.sql:ro
      - ./db/seed_collab.sql:/seed_collab.sql:ro
      - ./db/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d nextcrm"]
      interval: 10s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    environment:
      PORT: 8080
      DATABASE_URL: postgres://crm:crm@postgres:5432/nextcrm
      DEFAULT_ORG_ID: 1
      DEFAULT_USER_ID: 1
      CORS_ORIGIN: http://localhost:8088
      JWT_SECRET: change-me-in-prod
      # 浏览器可达的回调基址（经 web 的 nginx 反代到本服务）
      SELF_BASE_URL: http://localhost:8088
      # 企业微信 SSO（留空=开发模拟；生产填入企业凭据）
      WECOM_CORP_ID: ""
      WECOM_AGENT_ID: ""
      WECOM_SECRET: ""
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      args:
        VITE_API_BASE: ""   # 同源 /api，由 nginx 反代到 server
    volumes:
      - ./deploy/nginx.full.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8088:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  crm_pgdata:
